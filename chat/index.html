<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live-Chat</title>
    <style>
        :root {
            --primary-blue: rgb(0, 0, 130);
            --bg-light: #f0f8ff;
            --accent-crimson: crimson;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 4rem); /* Responsive font sizing */
            color: var(--primary-blue);
            margin-bottom: 10px;
            text-align: center;
        }

        .m {
            font-size: clamp(1rem, 4vw, 1.5rem);
            color: var(--primary-blue);
            margin-bottom: 40px;
            max-width: 600px;
            text-align: center;
            opacity: 0.8;
        }

        .container {
            width: 100%;
            max-width: 500px; /* Limits width on desktop */
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.2rem;
            font-weight: 600;
            border: 4px solid var(--primary-blue);
            border-radius: 50px;
            outline: none;
            box-sizing: border-box;
            transition: transform 0.2s;
        }

        input:focus {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: 800;
            background: lightblue;
            color: var(--primary-blue);
            border: 4px solid var(--primary-blue);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--primary-blue);
            color: white;
        }

        button:active {
            transform: scale(0.98);
        }

        span {
            color: var(--accent-crimson);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Live-Chat</h1>
    <p class="m">For public chat, type <span>"public"</span> in room name.</p>

    <div class="container">
        <input required type="text" placeholder="Room Name" id="room" name="room">
        <button onclick="opn()" id="submit">Submit</button>
    </div>

    <script>
        function opn(){
            var roomName = document.querySelector("#room").value.trim();
            if(roomName === "") {
                alert("Please enter a room name");
                return;
            }
            var link = "https://shashankkk16.github.io/chat/live.html?room=" + encodeURIComponent(roomName);
            window.open(link, "_self");
        }
    </script>
</body>
</html>
