<style>
    /* Modern Reset & Base Styles */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
        background: #121212;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
    }

    /* Main Container */
    .body {
        display: flex;
        flex-direction: column;
        height: 100vh;
        max-width: 1000px; /* Centers content on desktop */
        margin: 0 auto;
        width: 100%;
        position: relative;
    }

    /* Chat Area */
    .chat {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        scrollbar-width: thin;
        scrollbar-color: #3f51b5 #1e1e1e;
    }

    /* Custom Scrollbar for Chrome/Safari */
    .chat::-webkit-scrollbar { width: 6px; }
    .chat::-webkit-scrollbar-track { background: #1e1e1e; }
    .chat::-webkit-scrollbar-thumb { background: #3f51b5; border-radius: 10px; }

    /* Message Bubbles */
    #txt, #pxt {
        max-width: 80%;
        padding: 12px 16px;
        position: relative;
        font-size: 16px;
        line-height: 1.4;
        word-wrap: break-word;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    /* Sent by Others (Left) */
    #txt {
        align-self: flex-start;
        background: #2c2c2c;
        color: #fff;
        border-radius: 18px 18px 18px 4px;
        margin-left: 0;
        width: auto;
    }

    /* Sent by You (Right) */
    #pxt {
        align-self: flex-end;
        background: #3f51b5;
        color: #fff;
        border-radius: 18px 18px 4px 18px;
        margin-left: 0;
        width: auto;
    }

    /* Header Names inside Bubbles */
    #name-c, #name-m, #name-s, #name-i {
        font-size: 13px;
        margin-bottom: 4px;
        display: block;
        opacity: 0.9;
    }
    
    #name-c { color: #ffeb3b; } /* Self */
    #name-m { color: #80deea; } /* Others */

    /* Message Text */
    #mess {
        font-weight: normal;
        margin: 0;
    }

    /* Time Stamp */
    #tme {
        font-size: 10px;
        display: block;
        text-align: right;
        margin-top: 5px;
        opacity: 0.6;
        color: inherit;
    }

    /* Input Area */
    .mes {
        display: flex;
        padding: 15px;
        background: #1e1e1e;
        align-items: center;
        gap: 10px;
    }

    .message {
        flex: 1;
        height: 45px !important; /* Overriding your inline height */
        background: #2c2c2c;
        border: 1px solid #444;
        border-radius: 25px;
        color: white;
        padding: 12px 20px;
        font-size: 15px;
        outline: none;
        resize: none;
    }

    .send {
        width: 45px;
        height: 45px;
        background: #3f51b5;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.2s;
    }

    .send:active { transform: scale(0.9); }

    .send img {
        width: 20px;
        height: 20px;
        filter: invert(1);
    }

    /* Alert Banner */
    .alrt {
        position: fixed;
        top: -100px;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        max-width: 400px;
        padding: 15px;
        border-radius: 10px;
        text-align: center;
        z-index: 100;
        transition: top 0.4s ease;
        font-weight: bold;
    }

    /* Fix for Desktop images in chat */
    img {
        max-width: 100%;
        height: auto;
        border-radius: 10px;
        margin-top: 5px;
    }

    .message {
    min-height: 45px;
    height: auto !important;
    max-height: 150px;
    overflow-y: auto;
    white-space: pre-wrap; /* Preserves spaces/newlines */
}

/* Placeholder logic for contenteditable */
.message:empty:before {
    content: attr(data-placeholder);
    color: #888;
    cursor: text;
}

    /* Styling for the highlighted parts in the input */
.hl-bold { font-weight: bold; color: #fff; }
.hl-italic { font-style: italic; color: #fff; }
.hl-color { font-weight: bold; } /* Color will be set via inline style */
.hl-font { font-family: cursive; color: #80deea; }
</style>

<script src="https://www.gstatic.com/firebasejs/8.1.1/firebase-app.js"></script>

<script type="module">
var col = {
      "0" : "grey",
      "1" :  "red",
      "2" : "blue",
      "3" : "green",
      "4" : "cyan",
      "5" : "orange",
      "6" : "pink",
      "7" : "purple",
      "8" : "magenta",
      "9" : "lightgreen"
}
  let params = new URLSearchParams(document.location.search);
  let room = params.get("room");

  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.16.0/firebase-app.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCV24K_7FARbMsRGwtw8lWSdCe8x9v4MzE",
    authDomain: "live-shashankdav.firebaseapp.com",    projectId: "live-shashankdav",
    storageBucket: "live-shashankdav.appspot.com",
    messagingSenderId: "868265309052",
    appId: "1:868265309052:web:12860b9948bbee6bb5aaf9"
  };

  firebase.initializeApp(firebaseConfig);

  var pa = 0;
  let id = 1;
  let name = "";
  let localName = "user_" + Math.floor(10000000 + Math.random() * 90000000);;

function time(){
        var date = new Date();
        if (date.getHours() > 12){
              var current_time = date.getHours()-12 + ":" + date.getMinutes();
        }
        else{
              var current_time = date.getHours()+":"+date.getMinutes();
        }
        return current_time
}
function date(){
      var date = new Date();
      var current_date = date.getDate() + "/" + (date.getMonth()+1) +"/"+date.getFullYear();
      return current_date;
}

function show(){
  firebase.database().ref("/"+room+"/").on('value',(snap)=>{
    var totalRecord =  snap.numChildren();
    id = totalRecord;
    let e = document.querySelector(".chat");
    e.innerHTML = "";

    for (let i=1 ; i<id+1;i++){
            firebase.database().ref().child("/"+room).child(i).get().then((snapshot) => {
                  var el = document.createElement("div");
                  var he = document.createElement("h3");
                  var mes = document.createElement("h3");
                  var tme = document.createElement("h3");

                  mes.id = "mess"
                  tme.id = "tme"
                  
                  var messages = snapshot.val()['message'];
                  var message = messages.replace("\n" , "<br>");
                  for (let i=0 ; i<8 ; i++){
                  if (message.startsWith("*")){
                        mes.style.fontWeight = "1000";
                        message = message.substring(1);
                  }
                  if (message.startsWith("_")){
                        mes.style.fontStyle = "italic";
                        message = message.substring(1);
                  }
                  if (message.startsWith("|")){
                        mes.style.fontFamily = "fantasy";
                        message = message.substring(1);
                  }
                  if (message.startsWith("%")){
                        mes.style.fontFamily = "cursive";
                        message = message.substring(1);
                  }
                  if (message.startsWith("#")){
                        var cx = message.slice(1,2);
                        if (cx in col){
                              mes.style.color = col[cx];
                        }
                        else{
                              mes.style.color = "#6709ab";
                        }
                        message = message.substring(2);
                  }
                  }
                  if (snapshot.val()['name'] == localName){
                        el.id = "pxt";
                        he.id = "name-c";
                  }

                  else{
                       el.id = "txt";
                       he.id = "name-m";
                  }
                  he.innerHTML = snapshot.val()['name'];
                  mes.innerHTML = message;
                  tme.innerHTML = snapshot.val()['time'];
                  el.appendChild(he);
                  el.appendChild(mes);
                  el.appendChild(tme);
                  document.querySelector(".chat").appendChild(el);
                  let hit = document.querySelector(".chat").scrollHeight;
                  document.querySelector(".chat").scrollTop = hit;
})}})}

show()

function alrt(txt,col){
      document.querySelector(".alrt").style.top = "-5px";
      document.querySelector(".alrt").innerHTML = txt;
      document.querySelector(".alrt").style.background = col;
      setInterval(() => {
            document.querySelector(".alrt").style.top = "-300px";
      } , 4000)
}

const inputField = document.querySelector(".message");

function setEndOfContenteditable(contentEditableElement) {
    let range = document.createRange();
    range.selectNodeContents(contentEditableElement);
    range.collapse(false);
    let selection = window.getSelection();
    selection.removeAllRanges();
    selection.addRange(range);
}

inputField.addEventListener("input", (e) => {
    let text = inputField.innerText;
    let highlighted = text.replace(/\*(.*?)\*/g, '<span class="hl-bold">*$1*</span>');

    highlighted = highlighted.replace(/_(.*?)_/g, '<span class="hl-italic">_$1_</span>');
    
    highlighted = highlighted.replace(/#(\d)(\w+)/g, (match, num, word) => {
        let hex = col[num] || "#6709ab";
        return `<span style="color: ${hex}">#${num}${word}</span>`;
    });

    if (inputField.innerHTML !== highlighted) {
        inputField.innerHTML = highlighted;
        setEndOfContenteditable(inputField);
    }
});
function send(){
      let data = {};
      let msg = document.querySelector(".message").innerText;
      if (msg == ""){
            alrt("Enter Message.","rgb(255,70,0)")
      }
      else{
            data["message"] = msg;
            data["name"] = name;
            data["time"] = date() + " [" + time() + "]";
            let messNo = id + 1;

            firebase.database().ref(`/${room}/`+messNo).set(data,function(error) {
                if (error) {
                  console.log({error});
                } else {
                    pa = pa +1;
                    document.querySelector(".message").value = "";
      }
})
}
}
